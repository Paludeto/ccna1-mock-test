<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 1 v7 — Simulado Final (ITN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'');if(t==='dark')document.documentElement.dataset.theme='dark';})();</script>
<style>
:root{
  --bg:#F2F5F7; --card:#FFFFFF; --ink:#1B2A47; --muted:#607080; --line:#CDD5E0;
  --blue:#39D353; --blue-soft:#E4FAE9;
  --up:#39D353; --up-soft:#E4FAE9;
  --down:#D7263D; --down-soft:#FCE9EC;
  --amber:#E8830A; --amber-soft:#FDF0DC;
  --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  --disp:'Space Grotesk','Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font:16px/1.55 'Inter',system-ui,sans-serif}
.wrap{max-width:860px;margin:0 auto;padding:16px 14px 90px}
header.top{display:flex;align-items:center;gap:10px;padding:14px 2px}
.logo{font-family:var(--mono);font-weight:600;font-size:13px;background:#1B2A47;color:#39D353;padding:6px 10px;border-radius:6px;letter-spacing:.5px}
.logo::before{content:'>'; color:#39D353;margin-right:6px}
h1{font-family:var(--disp);font-size:22px;margin:0;line-height:1.2}
.sub{color:var(--muted);font-size:13px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-top:14px;box-shadow:0 1px 2px rgba(22,36,59,.05)}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
@media(max-width:620px){.mode-grid{grid-template-columns:1fr}}
.mode{cursor:pointer;border:1.5px solid var(--line);border-radius:14px;padding:18px;background:var(--card);color:var(--ink);transition:border-color .15s, transform .1s;text-align:left}
.mode:hover{border-color:var(--blue)}
.mode.sel{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-soft)}
.mode:active{transform:scale(.99)}
.mode h2{font-family:var(--disp);font-size:18px;margin:0 0 6px}
.mode p{margin:0;color:var(--muted);font-size:14px}
.mode .tag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;margin-bottom:10px}
.tag.b{background:var(--blue-soft);color:var(--blue)}
.tag.g{background:var(--up-soft);color:var(--up)}
.opts{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px;font-size:14px}
.opts label{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink)}
.opts label.hidden{display:none}
.opts input{width:17px;height:17px;accent-color:var(--blue)}
/* ---- patch panel ---- */
.panel{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
.port{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--line);background:#EBF0F5;cursor:pointer;font-family:var(--mono);font-size:0;position:relative}
.port::after{content:'';position:absolute;inset:5px;border-radius:3px;background:#B8C5D4}
.port.cur{border-color:var(--ink)}
.port.ans::after{background:var(--blue)}
.port.ok::after{background:var(--up)}
.port.bad::after{background:var(--down)}
/* ---- question ---- */
.qhead{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.qnum{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted)}
.qnum b{color:var(--ink)}
.timer{font-family:var(--mono);font-weight:600;font-size:15px;background:var(--ink);color:#fff;padding:5px 12px;border-radius:7px}
.timer.low{background:var(--down)}
.qtext{font-size:17px;font-weight:600;line-height:1.5;margin:14px 0 4px;white-space:pre-line}
.choose-hint{font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:600;margin-bottom:8px}
.exhibit{margin:12px 0;border:1px dashed var(--line);border-radius:10px;padding:10px;background:var(--bg);text-align:center}
.exhibit img{max-width:100%;border-radius:6px}
.exhibit .fb{display:none;color:var(--muted);font-size:13px;font-family:var(--mono)}
.exhibit a{color:var(--blue);font-size:12px;font-family:var(--mono)}
.optlist{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.opt{display:flex;gap:11px;align-items:flex-start;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;background:var(--card);font-size:15px;transition:border-color .12s,background .12s}
.opt:hover{border-color:#8FAFC4}
.opt .mark{flex:0 0 20px;height:20px;margin-top:1px;border:2px solid #A8BCCF;border-radius:50%;position:relative}
.opt.multi .mark{border-radius:5px}
.opt.sel{border-color:var(--blue);background:var(--blue-soft)}
.opt.sel .mark{border-color:var(--blue)}
.opt.sel .mark::after{content:'';position:absolute;inset:3px;background:var(--blue);border-radius:inherit}
.opt.right{border-color:var(--up);background:var(--up-soft)}
.opt.right .mark{border-color:var(--up)}
.opt.right .mark::after{content:'';position:absolute;inset:3px;background:var(--up);border-radius:inherit}
.opt.wrong{border-color:var(--down);background:var(--down-soft)}
.opt.wrong .mark{border-color:var(--down)}
.opt.wrong .mark::after{content:'';position:absolute;inset:3px;background:var(--down);border-radius:inherit}
.opt.dim{opacity:.55}
.opt code,.qtext code{font-family:var(--mono);font-size:.92em;background:#E8EEF5;padding:1px 5px;border-radius:4px}
/* ---- matching ---- */
.bank{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;padding:12px;border:1.5px dashed var(--line);border-radius:11px;background:#F5F9FC;min-height:52px}
.chip{font-family:var(--mono);font-size:13px;font-weight:600;padding:8px 12px;border-radius:8px;border:1.5px solid var(--ink);background:var(--card);color:var(--ink);cursor:pointer;user-select:none}
.chip.picked{background:var(--ink);color:#fff}
.bank-label{font-family:var(--mono);font-size:11px;color:var(--muted);width:100%;margin:-2px 0 2px}
.mrow{display:flex;gap:10px;align-items:stretch;margin-top:9px;flex-wrap:wrap}
.mdesc{flex:1 1 260px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--card)}
.mslot{flex:1 1 150px;min-height:44px;border:1.5px dashed #8FAFC4;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#EBF0F5;font-family:var(--mono);font-size:13px;color:#7A8FA0;padding:4px}
.mslot.hot{border-color:var(--blue);background:var(--blue-soft)}
.mslot .chip{border:none;background:var(--ink);color:#fff;width:100%;text-align:center}
.mslot.ok{border:1.5px solid var(--up);background:var(--up-soft)}
.mslot.bad{border:1.5px solid var(--down);background:var(--down-soft)}
/* ---- classify ---- */
.crow{border:1px solid var(--line);border-radius:11px;padding:12px;margin-top:9px;background:var(--card)}
.crow .it{font-size:14.5px;margin-bottom:9px}
.cbtns{display:flex;gap:8px;flex-wrap:wrap}
.cbtn{font-family:var(--mono);font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;color:var(--ink)}
.cbtn.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.crow.ok{border-color:var(--up);background:var(--up-soft)}
.crow.bad{border-color:var(--down);background:var(--down-soft)}
.crow .fix{font-family:var(--mono);font-size:12px;color:var(--down);font-weight:600;margin-top:7px}
/* ---- feedback / explanation ---- */
.verdict{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-weight:700;font-size:16px;margin-top:16px}
.verdict.ok{color:var(--up)} .verdict.bad{color:var(--down)}
.led{width:12px;height:12px;border-radius:3px}
.verdict.ok .led{background:var(--up);box-shadow:0 0 8px var(--up)}
.verdict.bad .led{background:var(--down);box-shadow:0 0 8px var(--down)}
.explain{margin-top:10px;border-left:3px solid var(--blue);background:var(--blue-soft);border-radius:0 10px 10px 0;padding:12px 14px;font-size:14px;color:#0A3D52}
.explain b{font-family:var(--mono);font-size:12px;display:block;margin-bottom:4px;color:var(--blue)}
/* ---- buttons / bars ---- */
.btnbar{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{font-family:var(--disp);font-weight:700;font-size:15px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer}
.btn.primary{background:var(--blue);color:#fff}
.btn.primary:disabled{background:#A8E8B8;cursor:not-allowed}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.danger{background:var(--down);color:#fff}
.spacer{flex:1}
.progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:14px}
.progress i{display:block;height:100%;background:var(--blue);border-radius:99px;transition:width .25s}
/* ---- results ---- */
.score-hero{text-align:center;padding:10px 0 4px}
.score-hero .pct{font-family:var(--disp);font-weight:700;font-size:56px;line-height:1}
.score-hero .pass{font-family:var(--mono);font-weight:600;font-size:14px;padding:5px 14px;border-radius:99px;display:inline-block;margin-top:10px}
.pass.yes{background:var(--up-soft);color:var(--up)}
.pass.no{background:var(--down-soft);color:var(--down)}
.statline{display:flex;justify-content:center;gap:22px;margin-top:14px;font-size:14px;color:var(--muted);flex-wrap:wrap}
.statline b{color:var(--ink);font-family:var(--mono)}
.rev-item{border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-top:10px;cursor:pointer;display:flex;gap:10px;align-items:baseline}
.rev-item .led{flex:0 0 10px;height:10px;border-radius:3px;position:relative;top:1px}
.rev-item.ok .led{background:var(--up)} .rev-item.bad .led{background:var(--down)}
.rev-item .t{font-size:14px}
.rev-item .n{font-family:var(--mono);font-size:11px;color:var(--muted)}
/* ---- flag for review ---- */
.qhead-right{display:flex;align-items:center;gap:8px}
.flagbtn{font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 11px;border-radius:7px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap}
.flagbtn:hover{border-color:var(--amber)}
.flagbtn.on{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}
.port.flag::before{content:'';position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:2px;background:var(--amber);box-shadow:0 0 0 1.5px var(--card);z-index:1}
/* ---- error bank ---- */
.bank-desc{color:var(--muted);font-size:14px;margin:8px 0 0}
.bank-desc b{color:var(--ink);font-family:var(--mono)}
/* ---- review with filters ---- */
.revfilters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 2px}
.rf{font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer}
.rf:hover{border-color:#8FAFC4}
.rf.on{background:var(--ink);border-color:var(--ink);color:#fff}
.rev-item{display:block;cursor:default}
.rev-head{display:flex;gap:10px;align-items:baseline}
.rev-item.blank .led{background:var(--amber)}
.rev-item.flagged{box-shadow:inset 3px 0 0 var(--amber)}
.rev-flag{color:var(--amber);font-family:var(--mono)}
.rev-detail{margin-top:9px;padding-left:20px}
.rev-detail .ans{font-family:var(--mono);font-size:12.5px;margin-top:3px;color:var(--muted);word-break:break-word}
.rev-detail .ans .lab{color:var(--muted)}
.rev-detail .ans.you{color:var(--down)}
.rev-detail .ans.you.ok{color:var(--up)}
.rev-detail .ans.cor{color:var(--up)}
.rev-explain{margin-top:9px;border-left:3px solid var(--blue);background:var(--blue-soft);border-radius:0 10px 10px 0;padding:10px 12px;font-size:13px;color:#0A3D52}
.rev-explain b{font-family:var(--mono);font-size:11px;display:block;margin-bottom:3px;color:var(--blue)}
.rev-open{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--blue);cursor:pointer;text-decoration:underline}
.hidden{display:none}
footer{color:var(--muted);font-size:12px;text-align:center;margin-top:30px;font-family:var(--mono)}
footer a{color:var(--muted)}
@media(max-width:480px){.qtext{font-size:16px}.btn{flex:1}}
/* ---- theme toggle button ---- */
.theme-btn{background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:16px;line-height:1;margin-left:auto;flex-shrink:0}
/* ---- dark mode ---- */
[data-theme="dark"]{
  --bg:#0F1117; --card:#1C1F26; --ink:#DDE4ED; --muted:#96A6B8; --line:#363D4E;
  --blue:#39D353; --blue-soft:#1A3526;
  --up:#39D353; --up-soft:#1A3526;
  --down:#F0445A; --down-soft:#2A1218;
  --amber:#F5A623; --amber-soft:#261C08;
}
[data-theme="dark"] .explain,[data-theme="dark"] .rev-explain{color:#C8E8D4}
[data-theme="dark"] .card{box-shadow:0 1px 4px rgba(0,0,0,.4)}
[data-theme="dark"] .mode.sel{box-shadow:0 0 0 2px #39D353}
[data-theme="dark"] .btn.primary:disabled{background:#1E4028;color:#4A7A5A}
[data-theme="dark"] .port{background:#252B36}
[data-theme="dark"] .port::after{background:#3A4355}
[data-theme="dark"] .bank,[data-theme="dark"] .exhibit{background:#161A22}
[data-theme="dark"] .mslot{background:#1E242E;color:#5A6A7A}
[data-theme="dark"] .chip.picked{background:#DDE4ED;color:#0F1117;border-color:#DDE4ED}
[data-theme="dark"] .mslot .chip{background:#DDE4ED;color:#0F1117}
[data-theme="dark"] .cbtn.sel{background:#DDE4ED;border-color:#DDE4ED;color:#0F1117}
[data-theme="dark"] .rf.on{background:#DDE4ED;border-color:#DDE4ED;color:#0F1117}
[data-theme="dark"] .timer{background:#2D3340}
[data-theme="dark"] .opt code,[data-theme="dark"] .qtext code{background:#252B36}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo">CCNA1#</div>
    <div style="flex:1">
      <h1>Simulado — Exame Final ITNv7</h1>
      <div class="sub">Introduction to Networks · 158 questões · aprovação ≥ 70%</div>
    </div>
    <button class="theme-btn" id="btn-theme" title="Alternar tema">🌙</button>
  </header>

  <!-- START -->
  <section id="screen-start">
    <div class="mode-grid">
      <button class="mode" id="btn-practice">
        <span class="tag g">PRÁTICA</span>
        <h2>Modo Prática</h2>
        <p>Feedback imediato com explicação após cada questão. Percorra todo o banco ou um subconjunto aleatório.</p>
      </button>
      <button class="mode" id="btn-exam">
        <span class="tag b">SIMULADO</span>
        <h2>Simulado Real</h2>
        <p>120 questões aleatórias, 1h40 de cronômetro, correção apenas no final — como no exame oficial.</p>
      </button>
    </div>
    <div class="card">
      <div id="practice-opts" class="opts">
        <label>Questões: <input type="number" id="opt-count" min="1" value="158" style="width:70px;font-family:var(--mono);padding:4px 8px;border-radius:6px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-weight:600;text-align:center"> <span id="count-avail" style="color:var(--muted);font-size:13px"></span></label>
      </div>
      <div class="btnbar" style="margin-top:14px">
        <button class="btn primary" id="btn-start">Iniciar prática →</button>
      </div>
    </div>
    <div class="card" id="bank-card">
      <div class="qnum">BANCO DE ERROS</div>
      <p class="bank-desc" id="bank-desc"></p>
      <div class="btnbar">
        <button class="btn primary" id="btn-study-bank">Estudar erros</button>
        <button class="btn ghost" id="btn-clear-bank">Limpar banco</button>
      </div>
    </div>
    <div class="card" id="mastered-card">
      <div class="qnum">QUESTÕES DOMINADAS</div>
      <p class="bank-desc" id="mastered-desc"></p>
      <div class="btnbar">
        <button class="btn ghost" id="btn-study-mastered">Revisar dominadas</button>
        <button class="btn ghost" id="btn-reset-mastered">Resetar progresso</button>
      </div>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz" class="hidden">
    <div class="card">
      <div class="qhead">
        <span class="qnum">QUESTÃO <b id="q-pos"></b> / <span id="q-total"></span> · <span id="q-orig"></span></span>
        <div class="qhead-right">
          <button class="flagbtn" id="btn-flag">☆ <span id="flag-lbl">Marcar</span></button>
          <span class="timer hidden" id="timer">100:00</span>
        </div>
      </div>
      <div class="progress"><i id="prog"></i></div>
      <div id="q-body"></div>
      <div class="btnbar">
        <button class="btn ghost" id="btn-home">Voltar ao Início</button>
        <button class="btn ghost" id="btn-prev">← Anterior</button>
        <span class="spacer"></span>
        <button class="btn primary" id="btn-check">Confirmar</button>
        <button class="btn primary hidden" id="btn-next">Próxima →</button>
        <button class="btn danger hidden" id="btn-finish">Entregar</button>
      </div>
    </div>
    <div class="card" id="nav-card">
      <div class="qnum">PAINEL DE QUESTÕES</div>
      <div class="panel" id="panel"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="screen-results" class="hidden">
    <div class="card">
      <div class="score-hero">
        <div class="pct" id="r-pct">0%</div>
        <div class="pass" id="r-pass"></div>
        <div class="statline">
          <span><span id="r-ok-lbl">Acertos</span> <b id="r-ok">0</b></span>
          <span><span id="r-bad-lbl">Erros</span> <b id="r-bad">0</b></span>
          <span><span id="r-blank-lbl">Em branco</span> <b id="r-blank">0</b></span>
          <span id="r-time-wrap" class="hidden"><span id="r-time-lbl">Tempo</span> <b id="r-time"></b></span>
        </div>
      </div>
      <div class="btnbar">
        <button class="btn primary" id="btn-retry-wrong">Refazer erradas</button>
        <button class="btn ghost" id="btn-restart">Início</button>
      </div>
    </div>
    <div class="card">
      <div class="qnum" id="lbl-rev-title">REVISÃO</div>
      <div class="revfilters" id="rev-filters">
        <button class="rf on" data-f="all">Todas</button>
        <button class="rf" data-f="wrong">Erradas</button>
        <button class="rf" data-f="right">Acertos</button>
        <button class="rf" data-f="flag">Marcadas</button>
      </div>
      <div id="r-list"></div>
    </div>
  </section>

  <footer>Banco de questões: ITN v7.00 Course Final · fonte <a href="https://itexamanswers.net/ccna-1-v7-0-final-exam-answers-full-introduction-to-networks.html" target="_blank">itexamanswers.net</a></footer>
</div>

<script>
'use strict';

/* ===================== ENGINE ===================== */
const $=s=>document.querySelector(s);
const IMG='https://itexamanswers.net/wp-content/uploads/';
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setEq(a,b){return a.length===b.length&&a.slice().sort().join()===b.slice().sort().join();}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

let S=null; // session state
let revFilter='all';
let selMode='practice'; // start-screen mode selection

/* ---------- error bank (persistent, localStorage) ---------- */
const QBY_N={}; // populated in init(), after the QUESTIONS const is initialized
const BANK_KEY='ccna1_errbank';
function loadBank(){try{const v=JSON.parse(localStorage.getItem(BANK_KEY));return (v&&typeof v==='object')?v:{};}catch(e){return {};}}
function saveBank(b){try{localStorage.setItem(BANK_KEY,JSON.stringify(b));}catch(e){}}
function bankDeck(){return Object.keys(loadBank()).map(n=>QBY_N[n]).filter(Boolean);}
function updateProgressFromSession(){
  const b=loadBank(), m=loadMastered();
  S.qs.forEach((rq,i)=>{
    const n=String(rq.src.n);
    if(!answered(i)&&S.mode!=='exam') return;
    if(S.correct[i]){
      if(n in b){b[n]=(b[n]||0)+1;if(b[n]>=2)delete b[n];}
      m[n]=1;
    }else{
      b[n]=0;
      delete m[n];
    }
  });
  saveBank(b);saveMastered(m);
}

function init(){
  QUESTIONS.forEach(q=>{QBY_N[q.n]=q;});
  $('#btn-practice').onclick=()=>selectMode('practice');
  $('#btn-exam').onclick=()=>selectMode('exam');
  $('#btn-start').onclick=()=>startSession(selMode);
  document.addEventListener('keydown',onKeydown);
  $('#btn-prev').onclick=()=>go(S.idx-1);
  $('#btn-next').onclick=()=>go(S.idx+1);
  $('#btn-check').onclick=checkCurrent;
  $('#btn-finish').onclick=tryFinish;
  $('#btn-restart').onclick=()=>{stopTimer();show('start');};
  $('#btn-retry-wrong').onclick=retryWrong;
  $('#btn-home').onclick=()=>{
    if(confirm('Deseja mesmo abandonar? Todo o progresso será perdido.')){stopTimer();show('start');}
  };
  $('#btn-flag').onclick=toggleFlag;
  $('#btn-study-bank').onclick=studyBank;
  $('#btn-clear-bank').onclick=clearBank;
  $('#btn-study-mastered').onclick=studyMastered;
  $('#btn-reset-mastered').onclick=resetMasteredConfirm;
  $('#opt-count').oninput=updateCountLabel;
  document.querySelectorAll('#rev-filters .rf').forEach(b=>{
    b.onclick=()=>{
      revFilter=b.dataset.f;
      document.querySelectorAll('#rev-filters .rf').forEach(x=>x.classList.toggle('on',x===b));
      renderReviewList();
    };
  });
  selectMode('practice');
}

function updateCountLabel(){
  const avail=QUESTIONS.length-masteredCount();
  const input=$('#opt-count');
  input.max=Math.max(1,avail);
  if(parseInt(input.value)>avail) input.value=avail;
  if(avail===0){input.disabled=true;}else{input.disabled=false;}
  $('#count-avail').textContent='de '+avail+' disponíveis';
}

function selectMode(m){
  selMode=m;
  $('#btn-practice').classList.toggle('sel',m==='practice');
  $('#btn-exam').classList.toggle('sel',m==='exam');
  $('#practice-opts').classList.toggle('hidden',m!=='practice');
  $('#btn-start').textContent=(m==='exam')?'Iniciar simulado →':'Iniciar prática →';
  if(m==='practice') updateCountLabel();
}

function onKeydown(e){
  if(!S) return;
  if($('#screen-quiz').classList.contains('hidden')) return;
  const tag=(document.activeElement&&document.activeElement.tagName)||'';
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
  if(e.key==='ArrowRight'){ e.preventDefault(); go(S.idx+1); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); go(S.idx-1); }
}

function show(name){
  $('#screen-start').classList.toggle('hidden',name!=='start');
  $('#screen-quiz').classList.toggle('hidden',name!=='quiz');
  $('#screen-results').classList.toggle('hidden',name!=='results');
  if(name==='start'){renderBankCard();renderMasteredCard();updateCountLabel();}
  window.scrollTo({top:0});
}

function buildRuntimeQ(q){
  const r={src:q};
  if(q.t==='s'||q.t==='m'){
    r.optOrder=shuffle(q.o.map((_,i)=>i));
  }else if(q.t==='match'){
    r.bank=shuffle(q.pairs.map(p=>p.r).concat(q.dis||[]));
    r.rowOrder=shuffle(q.pairs.map((_,i)=>i));
  }else if(q.t==='classify'){
    r.itemOrder=shuffle(q.items.map((_,i)=>i));
  }
  return r;
}

function startSession(mode,fixedSet){
  let qs;
  if(fixedSet){
    qs=fixedSet;
  }else if(mode==='exam'){
    qs=shuffle(QUESTIONS.slice()).slice(0,120);
  }else{
    const m=loadMastered();
    const avail=QUESTIONS.filter(q=>!m[q.n]);
    const count=Math.min(parseInt($('#opt-count').value)||avail.length,avail.length);
    qs=shuffle(avail).slice(0,Math.max(1,count));
  }
  S={mode,qs:qs.map(q=>buildRuntimeQ(q)),idx:0,
     answers:new Array(qs.length).fill(null),
     checked:new Array(qs.length).fill(false),
     correct:new Array(qs.length).fill(null),
     flagged:new Array(qs.length).fill(false),
     startedAt:Date.now()};
  $('#q-total').textContent=qs.length;
  $('#timer').classList.toggle('hidden',mode!=='exam');
  $('#btn-finish').classList.toggle('hidden',mode!=='exam');
  if(mode==='exam') startTimer(100*60); else stopTimer();
  buildPanel();
  show('quiz');
  go(0);
}

/* ---------- timer ---------- */
let timerInt=null;
function startTimer(secs){
  stopTimer();
  S.deadline=Date.now()+secs*1000;
  const tick=()=>{
    const left=Math.max(0,Math.round((S.deadline-Date.now())/1000));
    const m=String(Math.floor(left/60)).padStart(2,'0'),s=String(left%60).padStart(2,'0');
    const el=$('#timer'); el.textContent=m+':'+s;
    el.classList.toggle('low',left<300);
    if(left<=0){stopTimer();finish(true);}
  };
  tick(); timerInt=setInterval(tick,1000);
}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

/* ---------- panel ---------- */
function buildPanel(){
  const p=$('#panel'); p.innerHTML='';
  S.qs.forEach((_,i)=>{
    const b=document.createElement('button');
    b.className='port'; b.title='Q'+(i+1);
    b.onclick=()=>go(i);
    p.appendChild(b);
  });
  refreshPanel();
}
function refreshPanel(){
  [...$('#panel').children].forEach((b,i)=>{
    b.className='port'+(i===S.idx?' cur':'')+(S.flagged[i]?' flag':'');
    if(S.mode==='practice'&&S.checked[i]) b.classList.add(S.correct[i]?'ok':'bad');
    else if(answered(i)) b.classList.add('ans');
  });
}
function answered(i){
  const a=S.answers[i],q=S.qs[i].src;
  if(a==null) return false;
  if(q.t==='s') return a.sel!=null;
  if(q.t==='m') return a.sel&&a.sel.length>0;
  if(q.t==='match') return a.slots&&a.slots.some(x=>x!=null);
  if(q.t==='classify') return a.cats&&a.cats.some(x=>x!=null);
  return false;
}
function toggleFlag(){
  if(!S) return;
  S.flagged[S.idx]=!S.flagged[S.idx];
  $('#btn-flag').classList.toggle('on',S.flagged[S.idx]);
  $('#flag-lbl').textContent=S.flagged[S.idx]?'Marcada':'Marcar';
  refreshPanel();
}

/* ---------- error bank ---------- */
function renderBankCard(){
  const n=bankDeck().length;
  const desc=$('#bank-desc');
  if(n===0){desc.textContent='Nenhum erro registrado. Questões erradas aparecem aqui para revisão dirigida.';$('#btn-study-bank').disabled=true;}
  else{desc.innerHTML='Você tem <b>'+n+'</b> questão(ões) pendente(s). Acerte 2 vezes seguidas para remover.';$('#btn-study-bank').disabled=false;}

function studyBank(){

function clearBank(){

}

/* ---------- mastered ---------- */

function loadMastered(){try{const v=JSON.parse(localStorage.getItem(MASTERED_KEY));return(v&&typeof v==='object')?v:{};}catch(e){return{};}}
function saveMastered(m){try{localStorage.setItem(MASTERED_KEY,JSON.stringify(m));}catch(e){}}

/* ---------- navigation / render ---------- */
function go(i){
  if(i<0||i>=S.qs.length) return;
  S.idx=i;
  renderQ();
  refreshPanel();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderQ(){
  const rq=S.qs[S.idx], q=rq.src, locked=S.mode==='practice'&&S.checked[S.idx];
  $('#q-pos').textContent=S.idx+1;
  $('#q-orig').textContent='#'+q.n;
  $('#btn-flag').classList.toggle('on',!!S.flagged[S.idx]);
  $('#flag-lbl').textContent=S.flagged[S.idx]?'Marcada':'Marcar';
  $('#prog').style.width=((S.idx+1)/S.qs.length*100)+'%';
  $('#btn-prev').disabled=S.idx===0;
  const last=S.idx===S.qs.length-1;
  if(S.mode==='exam'){
    $('#btn-check').classList.add('hidden');
    $('#btn-next').classList.toggle('hidden',last);
  }else{
    $('#btn-check').classList.toggle('hidden',locked);
    $('#btn-next').classList.toggle('hidden',!locked);
    $('#btn-next').textContent=last?'Ver resultado →':'Próxima →';
    $('#btn-prev').textContent='← Anterior';
  }
  const body=$('#q-body'); body.innerHTML='';
  if(q.choose){
    const h=document.createElement('div');h.className='choose-hint';
    h.textContent='ESCOLHA '+q.choose+(q.choose>1?' ALTERNATIVAS':' ALTERNATIVA');
    body.appendChild(h);
  }
  const qt=document.createElement('div');qt.className='qtext';
  qt.textContent=q.q_pt||q.q;
  body.appendChild(qt);
  if(q.img){
    const localSrc=q.img.startsWith('imagens_simulado/')?'./'+q.img:'./imagens_simulado/'+q.img.split('/').pop();
    const externalSrc=IMG+(q.img_org||q.img);
    const ex=document.createElement('div');ex.className='exhibit';
    ex.innerHTML='<img src="'+localSrc+'" alt="Exibição da questão" loading="lazy" '+
      'onerror="if(this.src.indexOf(\'imagens_simulado\')!==-1){this.src=\''+externalSrc+'\';}else{this.style.display=\'none\';this.parentNode.querySelector(\'.fb\').style.display=\'block\';}">'+
      '<div class="fb">⚠ exibição indisponível offline — <a href="'+externalSrc+'" target="_blank">abrir imagem original</a></div>';
    body.appendChild(ex);
  }
  if(q.t==='s'||q.t==='m') renderChoice(body,rq,locked);
  else if(q.t==='match') renderMatch(body,rq,locked);
  else renderClassify(body,rq,locked);
  if(locked) showFeedback(body,rq);
}

function ensureAns(rq){
  let a=S.answers[S.idx];
  const q=rq.src;
  if(!a){
    if(q.t==='s') a={sel:null};
    else if(q.t==='m') a={sel:[]};
    else if(q.t==='match') a={slots:new Array(q.pairs.length).fill(null)};
    else a={cats:new Array(q.items.length).fill(null)};
    S.answers[S.idx]=a;
  }
  return a;
}

/* ---- single / multi ---- */
function renderChoice(body,rq,locked){
  const q=rq.src,a=ensureAns(rq);
  const list=document.createElement('div');list.className='optlist';
  const opts=q.o_pt||q.o;
  rq.optOrder.forEach(oi=>{
    const d=document.createElement('div');
    d.className='opt'+(q.t==='m'?' multi':'');
    d.innerHTML='<span class="mark"></span><span>'+opts[oi]+'</span>';
    const isSel=q.t==='s'?a.sel===oi:a.sel.includes(oi);
    if(!locked&&isSel)d.classList.add('sel');
    if(locked){
      const isCorr=q.t==='s'?q.a===oi:q.a.includes(oi);
      if(isCorr)d.classList.add('right');
      else if(isSel)d.classList.add('wrong');
      else d.classList.add('dim');
    }else{
      d.onclick=()=>{
        if(q.t==='s')a.sel=oi;
        else{
          const k=a.sel.indexOf(oi);
          if(k>=0)a.sel.splice(k,1);
          else{if(a.sel.length>=q.choose)a.sel.shift();a.sel.push(oi);}
        }
        renderQ();refreshPanel();
      };
    }
    list.appendChild(d);
  });
  body.appendChild(list);
}

/* ---- match (banco de fichas + alvos) ---- */
let pickedChip=null;
function renderMatch(body,rq,locked){
  const q=rq.src,a=ensureAns(rq);
  pickedChip=null;
  const pairs=q.pairs_pt||q.pairs;
  const dis=q.dis_pt||q.dis;
  const engPairs=q.pairs;
  const engDis=q.dis;
  const used=a.slots.filter(x=>x!=null);
  if(!locked){
    const bank=document.createElement('div');bank.className='bank';
    bank.innerHTML='<div class="bank-label">TOQUE EM UMA FICHA E DEPOIS EM UM ALVO (nem todas as opções são usadas)</div>';
    rq.bank.forEach(engTxt=>{
      if(used.includes(engTxt))return;
      let showTxt=engTxt;
      const idxInEng=engPairs.map(p=>p.r).concat(engDis||[]).indexOf(engTxt);
      if(idxInEng!==-1) showTxt=pairs.map(p=>p.r).concat(dis||[])[idxInEng];
      const c=document.createElement('button');c.className='chip';c.textContent=showTxt;
      c.onclick=()=>{
        if(pickedChip===engTxt){pickedChip=null;}else{pickedChip=engTxt;}
        [...bank.querySelectorAll('.chip')].forEach(x=>x.classList.toggle('picked',x.textContent===showTxt&&pickedChip===engTxt));
        [...body.querySelectorAll('.mslot')].forEach(x=>x.classList.toggle('hot',!!pickedChip));
      };
      bank.appendChild(c);
    });
    body.appendChild(bank);
  }
  rq.rowOrder.forEach(ri=>{
    const p=pairs[ri];
    const engP=engPairs[ri];
    const row=document.createElement('div');row.className='mrow';
    const desc=document.createElement('div');desc.className='mdesc';desc.textContent=p.l;
    const slot=document.createElement('div');slot.className='mslot';
    const val=a.slots[ri];
    if(val){
      let showVal=val;
      const idxInEng=engPairs.map(x=>x.r).concat(engDis||[]).indexOf(val);
      if(idxInEng!==-1) showVal=pairs.map(x=>x.r).concat(dis||[])[idxInEng];
      const c=document.createElement('span');c.className='chip';c.textContent=showVal;slot.appendChild(c);
    }
    else slot.textContent='— soltar aqui —';
    if(locked){
      slot.classList.add(val===engP.r?'ok':'bad');
      if(val!==engP.r){
        const fix=document.createElement('div');fix.className='mdesc';
        fix.style.flex='1 1 100%';fix.style.fontFamily='var(--mono)';fix.style.fontSize='12px';fix.style.color='var(--up)';
        fix.textContent='✔ correto: '+p.r;row.appendChild(desc);row.appendChild(slot);row.appendChild(fix);
        body.appendChild(row);return;
      }
    }else{
      slot.onclick=()=>{
        if(pickedChip){a.slots[ri]=pickedChip;pickedChip=null;}
        else if(a.slots[ri]){a.slots[ri]=null;}
        renderQ();refreshPanel();
      };
    }
    row.appendChild(desc);row.appendChild(slot);body.appendChild(row);
  });
}

/* ---- classify (categorias) ---- */
function renderClassify(body,rq,locked){
  const q=rq.src,a=ensureAns(rq);
  const items=q.items_pt||q.items;
  const cats=q.cats_pt||q.cats;
  rq.itemOrder.forEach(ii=>{
    const it=items[ii];
    const engIt=q.items[ii];
    const row=document.createElement('div');row.className='crow';
    const t=document.createElement('div');t.className='it';t.textContent=it.x;row.appendChild(t);
    const bs=document.createElement('div');bs.className='cbtns';
    cats.forEach((c,ci)=>{
      const b=document.createElement('button');b.className='cbtn';b.textContent=c;
      if(a.cats[ii]===ci)b.classList.add('sel');
      if(!locked)b.onclick=()=>{a.cats[ii]=ci;renderQ();refreshPanel();};
      else b.disabled=true;
      bs.appendChild(b);
    });
    row.appendChild(bs);
    if(locked){
      const ok=a.cats[ii]===engIt.c;
      row.classList.add(ok?'ok':'bad');
      if(!ok){const f=document.createElement('div');f.className='fix';f.textContent='✔ correto: '+cats[engIt.c];row.appendChild(f);}
    }
    body.appendChild(row);
  });
}

/* ---------- check / grade ---------- */
function grade(i){
  const rq=S.qs[i],q=rq.src,a=S.answers[i];
  if(!a)return false;
  if(q.t==='s')return a.sel===q.a;
  if(q.t==='m')return setEq(a.sel||[],q.a);
  if(q.t==='match')return q.pairs.every((p,ri)=>a.slots[ri]===p.r);
  if(q.t==='classify')return q.items.every((it,ii)=>a.cats[ii]===it.c);
  return false;
}
function checkCurrent(){
  ensureAns(S.qs[S.idx]);
  S.checked[S.idx]=true;
  S.correct[S.idx]=grade(S.idx);
  renderQ();refreshPanel();
  const last=S.idx===S.qs.length-1;
  if(S.mode==='practice'&&last){$('#btn-next').onclick=()=>finish(false);}
  else{$('#btn-next').onclick=()=>go(S.idx+1);}
}
function showFeedback(body,rq){
  const ok=S.correct[S.idx];
  const v=document.createElement('div');v.className='verdict '+(ok?'ok':'bad');
  v.innerHTML='<span class="led"></span>'+(ok?'Correto — link up':'Incorreto');
  body.appendChild(v);
  if(rq.src.ex){
    const e=document.createElement('div');e.className='explain';
    e.innerHTML='<b>EXPLICAÇÃO · '+(rq.src.topic||'')+'</b>'+rq.src.ex;
    body.appendChild(e);
  }
}
function tryFinish(){
  const blank=S.answers.filter((a,i)=>!answered(i)).length;
  if(blank>0&&!confirm(blank+' questão(ões) em branco. Entregar mesmo assim?'))return;
  finish(false);
}
function finish(timeUp){
  stopTimer();
  S.qs.forEach((_,i)=>{S.checked[i]=true;S.correct[i]=grade(i);});
  const ok=S.correct.filter(Boolean).length,total=S.qs.length;
  const blank=S.qs.filter((_,i)=>!answered(i)).length;
  const pct=Math.round(ok/total*100);
  $('#r-pct').textContent=pct+'%';
  const pass=$('#r-pass');
  pass.textContent=pct>=70?'APROVADO ✔ (mínimo 70%)':(timeUp?'TEMPO ESGOTADO — ':'')+'REPROVADO ✘ (mínimo 70%)';
  pass.className='pass '+(pct>=70?'yes':'no');
  $('#r-ok').textContent=ok;
  $('#r-bad').textContent=total-ok-blank;
  $('#r-blank').textContent=blank;
  const mins=Math.round((Date.now()-S.startedAt)/60000);
  $('#r-time-wrap').classList.toggle('hidden',S.mode!=='exam');
  $('#r-time').textContent=mins+' min';
  $('#btn-retry-wrong').disabled=ok===total;
  updateProgressFromSession();
  revFilter='all';
  document.querySelectorAll('#rev-filters .rf').forEach(x=>x.classList.toggle('on',x.dataset.f==='all'));
  renderReviewList();
  show('results');
}
function retryWrong(){
  const wrong=S.qs.filter((_,i)=>!S.correct[i]).map(rq=>rq.src);
  if(wrong.length)startSession('practice',shuffle(wrong));
}

/* ---------- post-exam review with filters ---------- */
function optText(q,idx){return(q.o_pt||q.o)[idx];}
function answerSummary(rq,i){
  const q=rq.src,a=S.answers[i];
  if(q.t==='s')
    return {you:(a&&a.sel!=null)?optText(q,a.sel):'(em branco)',cor:optText(q,q.a)};
  if(q.t==='m')
    return {you:(a&&a.sel&&a.sel.length)?a.sel.map(x=>optText(q,x)).join('  ·  '):'(em branco)',
            cor:q.a.map(x=>optText(q,x)).join('  ·  ')};
  if(q.t==='match'){
    const pairsLoc=q.pairs_pt||q.pairs,disLoc=q.dis_pt||q.dis;
    const engAll=q.pairs.map(p=>p.r).concat(q.dis||[]),locAll=pairsLoc.map(p=>p.r).concat(disLoc||[]);
    const L=v=>{const k=engAll.indexOf(v);return k>=0?locAll[k]:v;};
    return {you:q.pairs.map((p,ri)=>pairsLoc[ri].l+' → '+((a&&a.slots&&a.slots[ri])?L(a.slots[ri]):'—')).join('  ·  '),
            cor:q.pairs.map((p,ri)=>pairsLoc[ri].l+' → '+pairsLoc[ri].r).join('  ·  ')};
  }
  const itemsLoc=q.items_pt||q.items,catsLoc=q.cats_pt||q.cats;
  return {you:q.items.map((it,ii)=>itemsLoc[ii].x+' → '+((a&&a.cats&&a.cats[ii]!=null)?catsLoc[a.cats[ii]]:'—')).join('  ·  '),
          cor:q.items.map((it,ii)=>itemsLoc[ii].x+' → '+catsLoc[it.c]).join('  ·  ')};
}
function passFilter(i){
  if(revFilter==='right')return !!S.correct[i];
  if(revFilter==='wrong')return !S.correct[i]&&answered(i);
  if(revFilter==='flag')return !!S.flagged[i];
  return true;
}
function renderReviewList(){
  const list=$('#r-list'); list.innerHTML=''; let shown=0;
  S.qs.forEach((rq,i)=>{
    if(!passFilter(i))return;
    shown++;
    const q=rq.src,blank=!answered(i),ok=!!S.correct[i];
    const d=document.createElement('div');
    d.className='rev-item '+(blank?'blank':(ok?'ok':'bad'))+(S.flagged[i]?' flagged':'');
    const qtext=(q.q_pt||q.q).split('\n')[0];
    const snip=qtext.length>120?qtext.slice(0,120)+'…':qtext;
    const head=document.createElement('div');head.className='rev-head';
    head.innerHTML='<span class="led"></span><span class="t"><span class="n">Q'+(i+1)+' · #'+q.n+(S.flagged[i]?' <span class="rev-flag">★</span>':'')+'</span><br>'+esc(snip)+'</span>';
    d.appendChild(head);
    const det=document.createElement('div');det.className='rev-detail';
    const s=answerSummary(rq,i);
    const you=document.createElement('div');you.className='ans you'+(ok?' ok':'');
    you.innerHTML='<span class="lab">Sua resposta: </span>'+esc(blank?'(em branco)':s.you);
    det.appendChild(you);
    if(!ok){
      const cor=document.createElement('div');cor.className='ans cor';
      cor.innerHTML='<span class="lab">Correta: </span>'+esc(s.cor);det.appendChild(cor);
    }
    if(q.ex){
      const ex=document.createElement('div');ex.className='rev-explain';
      ex.innerHTML='<b>EXPLICAÇÃO · '+(q.topic||'')+'</b>'+q.ex;det.appendChild(ex);
    }
    const open=document.createElement('span');open.className='rev-open';open.textContent='abrir questão corrigida →';
    open.onclick=()=>{S.mode='practice';$('#timer').classList.add('hidden');$('#btn-finish').classList.add('hidden');show('quiz');go(i);};
    det.appendChild(open);
    d.appendChild(det);

{"n": 49, "t": "m", "choose": 2, "q": "What are two features of ARP? (Choose two.)", "o": ["When a host is encapsulating a packet into a frame, it refers to the MAC address table to determine the mapping of IP addresses to MAC addresses.", "An ARP request is sent to all devices on the Ethernet LAN and contains the IP address of the destination host and its multicast MAC address.", "If a host is ready to send a packet to a local destination device and it has the IP address but not the MAC address of the destination, it generates an ARP broadcast.", "If no device responds to the ARP request, then the originating node will broadcast the data packet to all devices on the network segment.", "If a device receiving an ARP request has the destination IPv4 address, it responds with an ARP reply."], "a": [2, 4], "topic": "9.2.2", "ex": "Sem o MAC do destino local, o host envia ARP broadcast (FFFF.FFFF.FFFF); o dono do IPv4 responde com ARP reply. Sem resposta, o pacote é descartado.", "q_pt": "Quais são dois recursos do ARP? (Escolha dois.)", "o_pt": ["Quando um host está encapsulando um pacote em uma **frame**, ele se refere à tabela de endereços MAC para determinar o mapeamento de endereços IP para endereços MAC.", "Uma solicitação ARP é enviada para todos os dispositivos na LAN Ethernet e contém o endereço IP do host de destino e seu endereço MAC multicast.", "Se um host estiver pronto para enviar um pacote para um dispositivo de destino local e tiver o endereço IP, mas não o endereço MAC do destino, ele gera uma transmissão ARP.", "Se nenhum dispositivo responder à solicitação ARP, o nó de origem transmitirá o pacote de dados para todos os dispositivos no segmento de rede.", "Se um dispositivo que recebe uma solicitação ARP tiver o endereço IPv4 de destino, ele responderá com uma resposta ARP."]},

{"n": 131, "t": "s", "q": "Two pings were issued from a host: to the default gateway (failed) and to a host outside the local network (successful). What is a possible cause for the failed ping?", "o": ["The default gateway is not operational.", "The default gateway device is configured with the wrong IP address.", "Security rules are applied to the default gateway device, preventing it from processing ping requests.", "The TCP/IP stack on the default gateway is not working properly."], "a": 2, "topic": "13.2.3", "ex": "Se o ping remoto funciona, o gateway está operacional e roteando — ele apenas bloqueia/ignora ICMP destinado a ele (regra de segurança).", "q_pt": "Dois pings foram emitidos de um host em uma rede local. O primeiro ping foi emitido para o endereço IP do gateway padrão do host e falhou. O segundo ping foi emitido para o endereço IP de um host fora da rede local e foi bem-sucedido. Qual é uma possível causa para o ping com falha?", "o_pt": ["O gateway padrão não está operacional.", "O dispositivo do gateway padrão está configurado com o endereço IP errado.", "As regras de segurança são aplicadas ao dispositivo do gateway padrão, impedindo-o de processar solicitações de ping.", "A pilha TCP/IP no gateway padrão não está funcionando corretamente."]},

{"n": 134, "t": "s", "q": "Refer to the exhibit. If host A sends an IP packet to host B, what will the destination address be in the frame when it leaves host A?", "img": "imagens_simulado/i274590v1n1_274590.png", "img_org": "2020/01/i274590v1n1_274590.png", "o": ["DD:DD:DD:DD:DD:DD", "172.168.10.99", "CC:CC:CC:CC:CC:CC", "172.168.10.65", "BB:BB:BB:BB:BB:BB", "AA:AA:AA:AA:AA:AA"], "a": 4, "topic": "9.1.2", "ex": "Destino remoto: o MAC de destino do quadro é o da interface local do roteador (BB:BB:BB:BB:BB:BB), não o do host final.", "q_pt": "Considere a figura. Se o host A enviar um pacote IP para o host B, qual será o endereço de destino na frame quando ela sair do host A?", "o_pt": ["DD:DD:DD:DD:DD:DD", "172.168.10.99", "CC:CC:CC:CC:CC:CC", "172.168.10.65", "BB:BB:BB:BB:BB:BB", "AA:AA:AA:AA:AA:AA"]},
{"n": 135, "t": "s", "q": "What is a benefit of using cloud computing in networking?", "o": ["Technology is integrated into every-day appliances allowing them to interconnect with other devices, making them more 'smart' or automated.", "Network capabilities are extended without requiring investment in new infrastructure, personnel, or software.", "End users have the freedom to use personal tools to access information and communicate across a business network.", "Home networking uses existing electrical wiring to connect devices to the network wherever there is an electrical outlet."], "a": 1, "topic": "1.7.6", "ex": "Cloud estende capacidades de TI sem investir em infraestrutura, pessoal ou licenças. As outras opções descrevem smart home, BYOD e powerline.", "q_pt": "Os usuários relatam que o acesso à rede está lento. Depois de questionar os funcionários, o administrador de rede soube que um funcionário baixou um programa de digitalização de terceiros para a impressora. Que tipo de malware pode ser introduzido que causa lentidão no desempenho da rede?", "o_pt": ["Vírus", "Worm", "Phishing", "Spam"]},
{"n": 136, "t": "m", "choose": 2, "q": "Which two statements are correct about MAC and IP addresses during data transmission if NAT is not involved? (Choose two.)", "o": ["Destination IP addresses in a packet header remain constant along the entire path to a target host.", "Destination MAC addresses will never change in a frame that goes across seven routers.", "Every time a frame is encapsulated with a new destination MAC address, a new destination IP address is needed.", "Destination and source MAC addresses have local significance and change every time a frame goes from one LAN to another.", "A packet that has crossed four routers has changed the destination IP address four times."], "a": [0, 3], "topic": "9.1.2", "ex": "IPs (L3) permanecem constantes fim a fim; MACs (L2) têm significado local e mudam a cada salto de rede.", "q_pt": "Quais duas afirmações estão corretas sobre endereços MAC e IP durante a transmissão de dados se o NAT não estiver envolvido? (Escolha dois.)", "o_pt": ["Os endereços IP de destino em um cabeçalho de pacote permanecem constantes ao longo de todo o caminho para um host de destino.", "Os endereços MAC de destino nunca mudarão em uma frame que passa por sete roteadores.", "Cada vez que uma frame é encapsulada com um novo endereço MAC de destino, um novo endereço IP de destino é necessário.", "Os endereços MAC de destino e de origem têm significado local e mudam toda vez que uma frame passa de uma LAN para outra.", "Um pacote que passou por quatro roteadores teve o endereço IP de destino alterado quatro vezes."]},
{"n": 137, "t": "s", "q": "What is one main characteristic of the data link layer?", "o": ["It generates the electrical or optical signals that represent the 1 and 0 on the media.", "It converts a stream of data bits into a predefined code.", "It shields the upper layer protocol from being aware of the physical medium to be used in the communication.", "It accepts Layer 3 packets and decides the path by which to forward the packet to a remote network."], "a": 2, "topic": "6.1.1", "ex": "A camada de enlace isola as camadas superiores dos detalhes da mídia física. Sinais elétricos/ópticos = camada física; escolha de caminho = camada de rede.", "q_pt": "Qual valor, que está contido em um campo de cabeçalho IPv4, é decrementado por cada roteador que recebe um pacote?", "o_pt": ["Comprimento do cabeçalho", "Serviços diferenciados", "Time-to-Live", "Deslocamento do fragmento"]},
{"n": 138, "t": "m", "choose": 3, "q": "What are three characteristics of the CSMA/CD process? (Choose three.)", "o": ["The device with the electronic token is the only one that can transmit after a collision.", "A device listens and waits until the media is not busy before transmitting.", "After detecting a collision, hosts can attempt to resume transmission after a random time delay has expired.", "All of the devices on a segment see data that passes on the network medium.", "A jam signal indicates that the collision has cleared and the media is not busy.", "Devices can be configured with a higher transmission priority."], "a": [1, 2, 3], "topic": "6.2.7", "ex": "CSMA/CD: escuta antes de transmitir; após colisão, espera tempo aleatório; em mídia compartilhada, todos veem os dados. Não há token nem prioridade.", "q_pt": "Quais são três características do processo CSMA/CD? (Escolha três.)", "o_pt": ["O dispositivo com o token eletrônico é o único que pode transmitir após uma colisão.", "Um dispositivo ouve e espera até que a mídia não esteja ocupada antes de transmitir.", "Após detectar uma colisão, os hosts podem tentar retomar a transmissão após o término de um atraso de tempo aleatório.", "Todos os dispositivos em um segmento veem os dados que passam pela mídia de rede.", "Um sinal de interferência indica que a colisão foi limpa e a mídia não está ocupada.", "Os dispositivos podem ser configurados com uma prioridade de transmissão mais alta."]},

{"n": 141, "t": "m", "choose": 2, "q": "What are two functions that are provided by the network layer? (Choose two.)", "o": ["directing data packets to destination hosts on other networks", "placing data on the network medium", "carrying data between processes that are running on source and destination hosts", "providing dedicated end-to-end connections", "providing end devices with a unique network identifier"], "a": [0, 4], "topic": "8.1.1", "ex": "Camada de rede: roteia pacotes a redes remotas e fornece identificadores únicos (IPs). Processos = transporte; mídia = física; conexões dedicadas não existem (best-effort).", "q_pt": "Um técnico de rede está pesquisando o uso de cabeamento de fibra óptica em um novo centro de tecnologia. Quais dois problemas devem ser considerados antes de implementar a mídia de fibra óptica? (Escolha dois.)", "o_pt": ["O cabeamento de fibra óptica exige uma experiência de terminação e emenda diferente da que o cabeamento de cobre exige.", "O cabeamento de fibra óptica exige aterramento específico para ser imune a EMI.", "O cabeamento de fibra óptica é suscetível à perda de sinal devido à RFI.", "O cabo de fibra óptica é capaz de suportar manuseio bruto.", "A fibra óptica oferece maior capacidade de dados, mas é mais cara do que o cabeamento de cobre."]},
{"n": 142, "t": "m", "choose": 2, "q": "Which two statements describe features of an IPv4 routing table on a router? (Choose two.)", "o": ["Directly connected interfaces will have two route source codes in the routing table: C and S.", "If there are two or more possible routes to the same destination, the route associated with the higher metric value is included in the routing table.", "The netstat -r command can be used to display the routing table of a router.", "The routing table lists the MAC addresses of each active interface.", "It stores information about routes derived from the active router interfaces.", "If a default static route is configured in the router, an entry will be included in the routing table with source code S."], "a": [4, 5], "topic": "8.5.6", "ex": "A tabela guarda rotas das interfaces ativas; rota estática padrão aparece com código S. Conectadas usam só C; vence a métrica MENOR; usa-se show ip route.", "q_pt": "Quais duas afirmações descrevem as características de uma tabela de roteamento IPv4 em um roteador? (Escolha dois.)", "o_pt": ["Interfaces diretamente conectadas terão dois códigos de origem de rota na tabela de roteamento: C e S.", "Se houver duas ou mais rotas possíveis para o mesmo destino, a rota associada ao valor métrico mais alto será incluída na tabela de roteamento.", "O comando netstat -r pode ser usado para exibir a tabela de roteamento de um roteador.", "A tabela de roteamento lista os endereços MAC de cada interface ativa.", "Ela armazena informações sobre rotas derivadas das interfaces ativas do roteador.", "Se uma rota estática padrão for configurada no roteador, uma entrada será incluída na tabela de roteamento com o código de origem S."]},
{"n": 143, "t": "s", "q": "What characteristic describes a VPN?", "o": ["software on a router that filters traffic based on IP addresses or applications", "software that identifies fast-spreading threats", "a tunneling protocol that provides remote users with secure access into the network of an organization", "a network device that filters access and traffic coming into a network"], "a": 2, "topic": "1.8.2", "ex": "VPN = túnel criptografado que dá a usuários remotos acesso seguro à rede da organização.", "q_pt": "Que característica descreve uma VPN?", "o_pt": ["Software em um roteador que filtra o tráfego com base em endereços IP ou aplicações", "Software que identifica ameaças de rápida propagação", "Um protocolo de tunelamento que fornece aos usuários remotos acesso seguro à rede de uma organização", "Um dispositivo de rede que filtra o acesso e o tráfego que entra em uma rede"]},

{"n": 148, "t": "m", "choose": 3, "q": "Data is being sent from a source PC to a destination server. Which three statements correctly describe the function of TCP or UDP in this situation? (Choose three.)", "o": ["The source port field identifies the running application or service that will handle data returning to the PC.", "The TCP process running on the PC randomly selects the destination port when establishing a session with the server.", "UDP segments are encapsulated within IP packets for transport across the network.", "The UDP destination port number identifies the application or service on the server which will handle the data.", "TCP is the preferred protocol when a function requires lower network overhead.", "The TCP source port number identifies the sending host on the network."], "a": [0, 2, 3], "topic": "14.4.2", "ex": "Porta de origem identifica a aplicação que receberá o retorno; segmentos são encapsulados em pacotes IP; porta de destino identifica o serviço no servidor. Quem identifica o host é o IP; menor overhead = UDP.", "q_pt": "Os dados estão sendo enviados de um PC de origem para um servidor de destino. Quais três afirmações descrevem corretamente a função do TCP ou UDP nessa situação? (Escolha três.)", "o_pt": ["O campo da porta de origem identifica a aplicação ou serviço em execução que lidará com os dados que retornam ao PC.", "O processo TCP em execução no PC seleciona aleatoriamente a porta de destino ao estabelecer uma sessão com o servidor.", "Os segmentos UDP são encapsulados em pacotes IP para transporte pela rede.", "O número da porta de destino UDP identifica a aplicação ou serviço no servidor que tratará os dados.", "O TCP é o protocolo preferido quando uma função requer menor sobrecarga de rede.", "O número da porta de origem TCP identifica o host de envio na rede."]},

// theme toggle
(function(){
  const btn=$('#btn-theme');
  function apply(dark){
    document.documentElement.dataset.theme=dark?'dark':'';
    btn.textContent=dark?'☀️':'🌙';
  }
  const stored=localStorage.getItem('theme');
  const dark=stored?stored==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;
  apply(dark);
  btn.onclick=function(){
    const isDark=document.documentElement.dataset.theme==='dark';
    localStorage.setItem('theme',isDark?'light':'dark');
    apply(!isDark);
  };
})();
</script>
